<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>You're Offline — Tennis Guide</title>
  <style>
    :root { --bg: #fdfcfb; --text: #1c1917; --sub: #57534e; --btn-bg: #dc2626; --btn-hover: #b91c1c; }
    @media (prefers-color-scheme: dark) {
      :root { --bg: #1c1917; --text: #fafaf9; --sub: #a8a29e; }
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 1.5rem;
    }
    .container { max-width: 400px; }
    .icon { font-size: 3rem; margin-bottom: 1rem; }
    h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 0.5rem; }
    p { color: var(--sub); font-size: 1rem; margin-bottom: 1.75rem; line-height: 1.5; }
    a {
      display: inline-block;
      background: var(--btn-bg);
      color: #fff;
      text-decoration: none;
      padding: 0.625rem 1.5rem;
      border-radius: 0.5rem;
      font-weight: 600;
      font-size: 0.9375rem;
      transition: background 0.15s;
    }
    a:hover { background: var(--btn-hover); }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">&#x1F4F5;</div>
    <h1>You're offline</h1>
    <p>Previously visited pages are still available. Reconnect to access new content.</p>
    <a href="/">Back to Tennis Guide</a>
  </div>
</body>
</html>
